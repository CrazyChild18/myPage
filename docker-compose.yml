services:
  voyageplanner:
    build: .
    container_name: voyageplanner
    restart: unless-stopped
    ports:
      - "0.0.0.0:25565:8080"
    environment:
      AMAP_WEB_SERVICE_KEY: ${AMAP_WEB_SERVICE_KEY:-}
      OVERSEAS_GEOCODE_PROVIDER: ${OVERSEAS_GEOCODE_PROVIDER:-nominatim}
    volumes:
      - voyageplanner-data:/data

volumes:
  voyageplanner-data:
